version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kozmocart_postgres
    environment:
      POSTGRES_USER: kozmocart
      POSTGRES_PASSWORD: kozmocart_dev_2026
      POSTGRES_DB: kozmocart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kozmocart -d kozmocart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kozmocart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kozmocart_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kozmocart.in
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
