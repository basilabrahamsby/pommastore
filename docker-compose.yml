services:
  postgres:
    image: postgres:16-alpine
    container_name: kozmocart_postgres
    environment:
      POSTGRES_USER: kozmocart
      POSTGRES_PASSWORD: kozmocart_dev_2026
      POSTGRES_DB: kozmocart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kozmocart -d kozmocart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kozmocart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build: ./backend
    container_name: kozmocart_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://kozmocart:kozmocart_dev_2026@postgres:5432/kozmocart_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  admin:
    build: ./frontend
    container_name: kozmocart_admin
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  storefront:
    build: ./storefront
    container_name: kozmocart_storefront
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./storefront:/app
      - /app/node_modules
      # - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
