limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Server block for teqmates.com and www.teqmates.com
server {
    listen 80;
    server_name teqmates.com www.teqmates.com;

    root /var/www/teqmates/landing;
    index index.html;

    # Admin Panel (served via Vite container port 5173, configured with base '/kozmocart/admin/')
    location /kozmocart/admin {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend (FastAPI on port 8000)
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads from the API container
    location /static_uploads {
        proxy_pass http://127.0.0.1:8000/static_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Next.js server on port 3000, configured with basePath '/kozmocart')
    location /kozmocart {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback to map root-level Next.js public assets (logo, placeholders, banners) to subpath
    location ~* ^/(logo\.png|placeholder-perfume\.png|hero-.*\.png|arch-.*\.png|banner-.*\.png)$ {
        proxy_pass http://127.0.0.1:3000/kozmocart$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Landing Page - Root (/)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Landing Page static assets fallback
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
