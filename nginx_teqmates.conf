limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name teqmates.com www.teqmates.com;
    return 301 https://$host$request_uri;
}

# HTTPS main server block
server {
    listen 443 ssl;
    server_name teqmates.com www.teqmates.com;

    ssl_certificate /etc/letsencrypt/live/teqmates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teqmates.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/teqmates/landing;
    index index.html;

    # Redirect /pommastore/admin (no trailing slash) → /pommastore/admin/
    location = /pommastore/admin {
        return 301 https://$host/pommastore/admin/;
    }

    # Admin Panel (Vite dev server on port 5173, base '/pommastore/admin/')
    location /pommastore/admin/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend (FastAPI on port 8000)
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads from the API container
    location /static_uploads {
        proxy_pass http://127.0.0.1:8000/static_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Next.js on port 3000, basePath '/pommastore')
    location /pommastore {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # logo.png — static file served from disk (used by admin + storefront)
    location = /logo.png {
        root /var/www/teqmates/landing;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Root-level storefront image assets
    location ~* ^/(placeholder-perfume\.png|hero-.*\.png|arch-.*\.png|banner-.*\.png)$ {
        proxy_pass http://127.0.0.1:3000/pommastore$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Landing Page - Root (/)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Landing Page static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
